name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches manifest.json version
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          manifest_version="$(node -p "require('./manifest.json').version")"
          if [[ "$tag" != "$manifest_version" ]]; then
            echo "Tag ($tag) does not match manifest.json version ($manifest_version)."
            exit 1
          fi

      - name: Check
        run: pnpm run check

      - name: Ensure release artifacts exist
        shell: bash
        run: |
          set -euo pipefail
          test -f main.js
          test -f manifest.json

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" main.js manifest.json --clobber
          else
            gh release create "$tag" \
              --title="$tag" \
              --draft \
              main.js manifest.json
          fi
